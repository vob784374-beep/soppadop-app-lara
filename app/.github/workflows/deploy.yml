name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/app-backend:latest -f backend/Dockerfile.prod backend
          docker push ghcr.io/${{ github.repository }}/app-backend:latest

      - name: Build and push frontend image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/app-frontend:latest frontend
          docker push ghcr.io/${{ github.repository }}/app-frontend:latest

      - name: Deploy to Kubernetes (kubectl)
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Apply k8s manifests
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          kubectl apply -f infra/k8s/backend-deployment.yaml
          kubectl apply -f infra/k8s/backend-service.yaml
          kubectl apply -f infra/k8s/frontend-deployment.yaml
          kubectl apply -f infra/k8s/frontend-service.yaml
