services:
  backend:
    build:
      context: ./backend
      target: prod
    env_file: ./backend/.env.production
    volumes:
      - backend_public:/var/www/html/public
    healthcheck:
      test: ["CMD-SHELL", "nc -w1 localhost 9000 < /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}

  nginx:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_public:/var/www/html/public:ro

volumes:
  backend_public:

networks:
  app_network:
    driver: bridge
